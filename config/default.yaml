# Default configuration for the LLM evaluation pipeline.
# Any value here can be overridden by an environment variable using the
# EVAL_ prefix and "__" as the nesting delimiter, e.g.:
#   EVAL_API__PORT=9000
#   EVAL_OLLAMA__BASE_URL=http://ollama:11434
#   EVAL_JUDGE__MODEL=llama3.2

provider: ollama  # ollama | mock

ollama:
  base_url: http://ollama:11434
  request_timeout_s: 120.0
  generate_path: /api/generate

judge:
  enabled: true
  provider: ollama        # uses the same ollama config above
  model: llama3.2
  temperature: 0.0
  prompt_template: |
    You are an impartial grader. Compare the assistant's answer to the
    expected answer for the given question and decide whether the assistant's
    answer is correct.

    Question: {query}

    Expected answer: {expected_answer}

    Assistant answer: {generated_answer}

    Reply with a single token: CORRECT or INCORRECT. Be strict but fair:
    answers that capture the same key facts as the expected answer should be
    judged CORRECT even if wording differs.

inference:
  temperature: 0.0
  max_tokens: 512
  request_timeout_s: 120.0
  max_retries: 3
  retry_initial_backoff_s: 1.0
  retry_max_backoff_s: 16.0

cache:
  directory: ./cache

runner:
  max_workers_per_model: 4   # samples processed concurrently within a single model thread

api:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  json: true
