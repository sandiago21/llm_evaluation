services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  scoring-api:
    build: .
    container_name: scoring-api
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      EVAL_PROVIDER: ollama
      EVAL_OLLAMA__BASE_URL: http://ollama:11434
      EVAL_CACHE__DIRECTORY: /app/cache
      EVAL_LOGGING__LEVEL: INFO
      EVAL_LOGGING__JSON: "true"
    volumes:
      - ./cache:/app/cache
      - ./data:/app/data:ro

volumes:
  ollama-data:
