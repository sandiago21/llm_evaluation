  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # needs: test-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fastapi-app .

  api-smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fastapi-app .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 \
            -e SKIP_ROUTER_MODEL=true \
            --name app fastapi-app

      - name: Check containers
        run: docker ps -a

      - name: Wait for app
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8000/docs > /dev/null; then
              echo "API up after ${i} attempts"
              exit 0
            fi
            sleep 1
          done
          echo "API never became reachable"
          docker logs app
          exit 1

      - name: Show logs
        if: always()
        run: docker logs app

      - name: Test API docs endpoint
        run: curl --fail http://localhost:8000/docs

